  <text x="62" y="202" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#ffffff" fill-opacity="0.92" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">I</text>

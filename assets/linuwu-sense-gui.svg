  <text x="62" y="274" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#a78bfa" fill-opacity="0.88" style="fill:rgb(167, 139, 250);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">U</text>
  <text x="62" y="310" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#a78bfa" fill-opacity="0.88" style="fill:rgb(167, 139, 250);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">W</text>
  <text x="62" y="346" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#a78bfa" fill-opacity="0.88" style="fill:rgb(167, 139, 250);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">U</text>


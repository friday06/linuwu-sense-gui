  <!-- 5 letters × 36px, start y = 256 - (4*36)/2 = 184 -->
  <text x="450" y="184" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#ff3a3a" fill-opacity="0.95" style="fill:rgb(255, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">S</text>
  <text x="450" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#ff3a3a" fill-opacity="0.95" style="fill:rgb(255, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">e</text>
  <text x="450" y="256" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#ff3a3a" fill-opacity="0.95" style="fill:rgb(255, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">n</text>
  <text x="450" y="292" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#ff3a3a" fill-opacity="0.95" style="fill:rgb(255, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">s</text>
  <text x="450" y="328" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Noto Sans',sans-serif" font-size="28" font-weight="700" fill="#ff3a3a" fill-opacity="0.95" style="fill:rgb(255, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Noto Sans&quot;, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:central">e</text>

  <!-- Thin right-column divider -->
  <rect x="413" y="120" width="1" height="272" fill="#ff3a3a" fill-opacity="0.2" style="fill:rgb(255, 58, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Borders -->
  <rect x="0" y="0" width="512" height="512" rx="110" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-opacity="0.5" style="fill:none;stroke:rgb(124, 58, 237);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="4" y="4" width="504" height="504" rx="107" fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.14" style="fill:none;stroke:rgb(56, 189, 248);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>